  /v2/evm/accounts/{address}/eip7702/delegation:
    post:
      x-audience: public
      summary: Create EIP-7702 delegation
      description: |-
        Creates an EIP-7702 delegation for an EVM EOA account, upgrading it with smart account capabilities.

        This endpoint:
        - Retrieves delegation artifacts from onchain
        - Signs the EIP-7702 authorization for delegation
        - Assembles and submits a Type 4 transaction
        - Creates an associated smart account object

        The delegation allows the EVM EOA to be used as a smart account, which enables batched transactions and gas sponsorship via paymaster.
      operationId: createEvmEip7702Delegation
      tags:
        - EVM Accounts
      security:
        - apiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/XWalletAuth'
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: address
          description: The 0x-prefixed address of the EVM account to delegate.
          in: path
          required: true
          schema:
            type: string
            pattern: ^0x[0-9a-fA-F]{40}$
            example: '0x742d35Cc6634C0532925a3b844Bc454e4438f44e'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                network:
                  $ref: '#/components/schemas/EvmEip7702DelegationNetwork'
                enableSpendPermissions:
                  type: boolean
                  description: Whether to configure spend permissions for the upgraded, delegated account. When enabled, the account can grant permissions for third parties to spend on its behalf.
                  default: false
                  example: true
              required:
                - network
      responses:
        '201':
          description: Delegation operation created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  delegationOperationId:
                    type: string
                    format: uuid
                    description: The unique identifier for the delegation operation. Use this to poll the operation status.
                    example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                required:
                  - delegationOperationId
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missing_network:
                  value:
                    errorType: invalid_request
                    errorMessage: Field 'network' is required.
                    errorParam: network
                    errorLink: https://docs.cdp.coinbase.com/api-reference/v2/errors#invalid-request
                unsupported_network:
                  value:
                    errorType: invalid_request
                    errorMessage: Network 'gnosis' is not supported for EIP-7702.
                    errorParam: network
                    errorLink: https://docs.cdp.coinbase.com/api-reference/v2/errors#invalid-request
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '402':
          $ref: '#/components/responses/PaymentMethodRequiredError'
        '404':
          description: EVM account not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                not_found:
                  value:
                    errorType: not_found
                    errorMessage: EVM account with the given address not found.
                    errorParam: address
                    errorLink: https://docs.cdp.coinbase.com/api-reference/v2/errors#not-found
        '409':
          description: Account already delegated on the given network.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                already_delegated:
                  value:
                    errorType: already_exists
                    errorMessage: Account already has an active EIP-7702 delegation on the given network.
                    errorParam: address
                    errorLink: https://docs.cdp.coinbase.com/api-reference/v2/errors#already-exists
        '422':
          $ref: '#/components/responses/IdempotencyError'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '502':
