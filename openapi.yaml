  /v2/embedded-wallet-api/projects/{projectId}/end-users/{userId}/solana/{address}/send/{asset}:
    post:
      x-audience: public
      summary: Send USDC on Solana
      description: |-
        Sends USDC from an end user's Solana account to a recipient address on the Solana network. This endpoint simplifies USDC transfers by automatically handling mint resolution, Associated Token Account (ATA) creation, decimal conversion, and transaction encoding.
        The `amount` field accepts human-readable amounts as decimal strings (e.g., "1.5", "25.50").
        Use the optional `createRecipientAta` parameter to control whether the sender pays for creating the recipient's Associated Token Account if it doesn't exist.
      operationId: sendSolanaAssetWithEndUserAccount
      tags:
        - Embedded Wallets (Core Functionality)
      security:
        - endUserAuth: []
        - apiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/XWalletAuth'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XDeveloperAuth'
        - name: projectId
          in: path
          required: true
          description: The ID of the CDP Project.
          schema:
            type: string
            pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$
            example: 8e03978e-40d5-43e8-bc93-6894a57f9324
        - name: userId
          in: path
          required: true
          description: The ID of the end user.
          schema:
            type: string
            pattern: ^[a-zA-Z0-9-]{1,100}$
          example: e051beeb-7163-4527-a5b6-35e301529ff2
        - name: address
          description: The base58 encoded address of the Solana account to send USDC from.
          in: path
          required: true
          schema:
            allOf:
              - $ref: '#/components/schemas/BlockchainAddress'
            pattern: ^[1-9A-HJ-NP-Za-km-z]{32,44}$
          example: HpabPRRCFbBKSuJr5PdkVvQc85FyxyTWkFM2obBRSvHT
        - name: asset
          in: path
          required: true
          description: The asset to send. Currently only "usdc" is supported.
          schema:
            allOf:
              - $ref: '#/components/schemas/Asset'
            enum:
              - usdc
          example: usdc
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                to:
                  allOf:
                    - $ref: '#/components/schemas/BlockchainAddress'
                  pattern: ^[1-9A-HJ-NP-Za-km-z]{32,44}$
                  description: The base58 encoded address of the recipient.
                  example: ExXhNkgYf6efh7YyqDRVxPZuzafobao1A74drUdp8trd
                amount:
                  type: string
                  minLength: 1
                  maxLength: 32
                  description: The amount of USDC to send as a decimal string (e.g., "1.5" or "25.50").
                  example: '1.50'
                network:
                  type: string
                  description: The Solana network to send USDC on.
                  enum:
                    - solana
                    - solana-devnet
                  example: solana-devnet
                createRecipientAta:
                  type: boolean
                  description: Whether to automatically create an Associated Token Account (ATA) for the recipient if it doesn't exist. When true, the sender pays the rent-exempt minimum to create the recipient's USDC ATA. When false, the transaction will fail if the recipient doesn't have a USDC ATA.
                  example: true
                walletSecretId:
                  description: Required when not using delegated signing. The ID of the Temporary Wallet Secret that was used to sign the X-Wallet-Auth Header.
                  type: string
                  pattern: ^[a-zA-Z0-9-]{1,100}$
                  example: e051beeb-7163-4527-a5b6-35e301529ff2
                useCdpSponsor:
                  type: boolean
                  description: Whether transaction fees should be sponsored by CDP. When true, CDP sponsors the transaction fees on behalf of the end user. When false, the end user is responsible for paying the transaction fees.
                  example: true
              required:
                - to
                - amount
                - network
            examples:
              send_usdc_auto_create_ata:
                summary: Send USDC (auto-create ATA)
                value:
                  to: ExXhNkgYf6efh7YyqDRVxPZuzafobao1A74drUdp8trd
                  amount: '25.50'
                  network: solana-devnet
                  createRecipientAta: true
                  walletSecretId: e051beeb-7163-4527-a5b6-35e301529ff2
              send_usdc_no_ata_creation:
                summary: Send USDC (no ATA creation)
                value:
                  to: ExXhNkgYf6efh7YyqDRVxPZuzafobao1A74drUdp8trd
                  amount: '5.00'
                  network: solana-devnet
                  createRecipientAta: false
                  walletSecretId: e051beeb-7163-4527-a5b6-35e301529ff2
              send_usdc_sponsored:
                summary: Send USDC with CDP gas sponsorship
                value:
                  to: ExXhNkgYf6efh7YyqDRVxPZuzafobao1A74drUdp8trd
                  amount: '25.50'
                  network: solana-devnet
                  walletSecretId: e051beeb-7163-4527-a5b6-35e301529ff2
                  useCdpSponsor: true
      responses:
        '200':
          description: Successfully sent transaction.
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactionSignature:
                    type: string
                    description: The base58 encoded transaction signature.
                    example: 5VERv8NMvzbJMEkV8xnrLkEaWRtSz9CosKDYjCJjBRnbJLgp8uirBgmQpjKhoR4tjF3ZpRzrFmBV6UjKdiSZkQUW
                required:
                  - transactionSignature
              examples:
                successful_transfer:
                  value:
                    transactionSignature: 5VERv8NMvzbJMEkV8xnrLkEaWRtSz9CosKDYjCJjBRnbJLgp8uirBgmQpjKhoR4tjF3ZpRzrFmBV6UjKdiSZkQUW
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid_amount:
                  value:
                    errorType: invalid_request
                    errorMessage: Invalid amount format. Amount must be a valid decimal string.
                    errorParam: amount
                    errorLink: https://docs.cdp.coinbase.com/api-reference/v2/errors#invalid-request
                invalid_network:
                  value:
                    errorType: invalid_request
                    errorMessage: Unsupported network for USDC transfers.
                    errorParam: network
                    errorLink: https://docs.cdp.coinbase.com/get-started/supported-networks#supported-networks
                invalid_asset:
                  value:
                    errorType: invalid_request
                    errorMessage: Unsupported asset. Currently only 'usdc' is supported.
                    errorParam: asset
                    errorLink: https://docs.cdp.coinbase.com/api-reference/v2/errors#invalid-request
                insufficient_balance:
                  value:
                    errorType: invalid_request
                    errorMessage: Account has insufficient USDC balance to complete the transfer.
                    errorParam: amount
                    errorLink: https://docs.cdp.coinbase.com/api-reference/v2/errors#invalid-request
                insufficient_sol:
                  value:
                    errorType: invalid_request
                    errorMessage: Account has insufficient SOL to pay for transaction fees and rent.
                    errorLink: https://docs.cdp.coinbase.com/api-reference/v2/errors#invalid-request
                recipient_ata_missing:
                  value:
                    errorType: invalid_request
                    errorMessage: 'Recipient does not have a USDC Associated Token Account. Set ''createRecipientAta: true'' to create one automatically.'
                    errorParam: to
                    errorLink: https://docs.cdp.coinbase.com/api-reference/v2/errors#invalid-request
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '402':
          $ref: '#/components/responses/PaymentMethodRequiredError'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                not_found:
                  value:
                    errorType: not_found
                    errorMessage: Solana account with the given address not found.
                    errorParam: address
                    errorLink: https://docs.cdp.coinbase.com/api-reference/v2/errors#not-found
        '422':
          $ref: '#/components/responses/IdempotencyError'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '502':
          $ref: '#/components/responses/BadGatewayError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
