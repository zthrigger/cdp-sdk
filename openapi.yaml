  /v2/embedded-wallet-api/projects/{projectId}/end-users/{userId}/evm/{address}/send/{asset}:
    post:
      x-audience: public
      summary: Send USDC on EVM
      description: |-
        Sends USDC from an end user's EVM account (EOA or Smart Account) to a recipient address on a supported EVM network. This endpoint simplifies USDC transfers by automatically handling contract resolution, decimal conversion, gas estimation, and transaction encoding.
        The `amount` field accepts human-readable amounts as decimal strings (e.g., "1.5", "25.50").
      operationId: sendEvmAssetWithEndUserAccount
      tags:
        - Embedded Wallets (Core Functionality)
      security:
        - endUserAuth: []
        - apiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/XWalletAuth'
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: projectId
          in: path
          required: true
          description: The ID of the CDP Project.
          schema:
            type: string
            pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$
            example: 8e03978e-40d5-43e8-bc93-6894a57f9324
        - name: userId
          in: path
          required: true
          description: The ID of the end user.
          schema:
            type: string
            pattern: ^[a-zA-Z0-9-]{1,100}$
          example: e051beeb-7163-4527-a5b6-35e301529ff2
        - name: address
          description: The 0x-prefixed address of the EVM account (EOA or Smart Account) to send USDC from. The address does not need to be checksummed.
          in: path
          required: true
          schema:
            allOf:
              - $ref: '#/components/schemas/BlockchainAddress'
            pattern: ^0x[0-9a-fA-F]{40}$
          example: '0x742d35Cc6634C0532925a3b844Bc454e4438f44e'
        - name: asset
          in: path
          required: true
          description: The asset to send. Currently only "usdc" is supported.
          schema:
            allOf:
              - $ref: '#/components/schemas/Asset'
            enum:
              - usdc
          example: usdc
        - $ref: '#/components/parameters/XDeveloperAuth'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                to:
                  allOf:
                    - $ref: '#/components/schemas/BlockchainAddress'
                  pattern: ^0x[0-9a-fA-F]{40}$
                  description: The 0x-prefixed address of the recipient.
                  example: '0x1234567890123456789012345678901234567890'
                amount:
                  type: string
                  minLength: 1
                  maxLength: 32
                  description: The amount of USDC to send as a decimal string (e.g., "1.5" or "25.50").
                  example: '1.50'
                network:
                  type: string
                  description: The EVM network to send USDC on.
                  enum:
                    - base
                    - base-sepolia
                    - ethereum
                    - ethereum-sepolia
                    - avalanche
                    - polygon
                    - optimism
                    - arbitrum
                  example: base-sepolia
                useCdpPaymaster:
                  type: boolean
                  description: Whether to use CDP Paymaster to sponsor gas fees. Only applicable for EVM Smart Accounts. When true, the transaction gas will be paid by the Paymaster, allowing users to send USDC without holding native gas tokens. Ignored for EOA accounts. Cannot be used together with `paymasterUrl`.
                  example: true
                paymasterUrl:
                  allOf:
                    - $ref: '#/components/schemas/Url'
                  description: Optional custom Paymaster URL to use for gas sponsorship. Only applicable for EVM Smart Accounts. This allows you to use your own Paymaster service instead of CDP's Paymaster. Cannot be used together with `useCdpPaymaster`.
                  example: https://api.developer.coinbase.com/rpc/v1/base/AbCdEf123456
                walletSecretId:
                  description: Required when not using delegated signing. The ID of the Temporary Wallet Secret that was used to sign the X-Wallet-Auth Header.
                  type: string
                  pattern: ^[a-zA-Z0-9-]{1,100}$
                  example: e051beeb-7163-4527-a5b6-35e301529ff2
              required:
                - to
                - amount
                - network
            examples:
              send_usdc_eoa:
                summary: Send USDC from EOA
                value:
                  to: '0x1234567890123456789012345678901234567890'
                  amount: '25.50'
                  network: base-sepolia
                  walletSecretId: e051beeb-7163-4527-a5b6-35e301529ff2
              send_usdc_smart_account_cdp_paymaster:
                summary: Send USDC from Smart Account with CDP Paymaster
                value:
                  to: '0x1234567890123456789012345678901234567890'
                  amount: '10.00'
                  network: base-sepolia
                  useCdpPaymaster: true
                  walletSecretId: e051beeb-7163-4527-a5b6-35e301529ff2
              send_usdc_smart_account_custom_paymaster:
                summary: Send USDC from Smart Account with custom Paymaster
                value:
                  to: '0x1234567890123456789012345678901234567890'
                  amount: '15.00'
                  network: base-sepolia
                  paymasterUrl: https://api.developer.coinbase.com/rpc/v1/base/AbCdEf123456
                  walletSecretId: e051beeb-7163-4527-a5b6-35e301529ff2
      responses:
        '200':
          description: Successfully sent transaction.
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactionHash:
                    type: string
                    description: The hash of the transaction, as a 0x-prefixed hex string. Populated for EOA accounts. Null for Smart Accounts (use userOpHash instead).
                    example: '0xf8f98fb6726fc936f24b2007df5cb20e2b8444ff3dfaa2a929335f432a9be2e7'
                    nullable: true
                  userOpHash:
                    type: string
                    description: The hash of the user operation, as a 0x-prefixed hex string. Populated for Smart Accounts. Null for EOA accounts (use transactionHash instead).
                    example: '0x1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef'
                    nullable: true
              examples:
                eoa_transfer:
                  summary: EOA transfer response
                  value:
                    transactionHash: '0xf8f98fb6726fc936f24b2007df5cb20e2b8444ff3dfaa2a929335f432a9be2e7'
                    userOpHash: null
                smart_account_transfer:
                  summary: Smart Account transfer response
                  value:
                    transactionHash: null
                    userOpHash: '0x1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid_amount:
                  value:
                    errorType: invalid_request
                    errorMessage: Invalid amount format. Amount must be a valid decimal string.
                    errorParam: amount
                    errorLink: https://docs.cdp.coinbase.com/api-reference/v2/errors#invalid-request
                invalid_network:
                  value:
                    errorType: invalid_request
                    errorMessage: Unsupported network for USDC transfers.
                    errorParam: network
                    errorLink: https://docs.cdp.coinbase.com/get-started/supported-networks#supported-networks
                invalid_asset:
                  value:
                    errorType: invalid_request
                    errorMessage: Unsupported asset. Currently only 'usdc' is supported.
                    errorParam: asset
                    errorLink: https://docs.cdp.coinbase.com/api-reference/v2/errors#invalid-request
                insufficient_balance:
                  value:
                    errorType: invalid_request
                    errorMessage: Account has insufficient USDC balance to complete the transfer.
                    errorParam: amount
                    errorLink: https://docs.cdp.coinbase.com/api-reference/v2/errors#invalid-request
                conflicting_paymaster:
                  value:
                    errorType: invalid_request
                    errorMessage: Cannot specify both 'useCdpPaymaster' and 'paymasterUrl'. Please use only one.
                    errorLink: https://docs.cdp.coinbase.com/embedded-wallets/evm-features/smart-accounts#gas-sponsorship-with-paymaster
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '402':
          $ref: '#/components/responses/PaymentMethodRequiredError'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                not_found:
                  value:
                    errorType: not_found
                    errorMessage: EVM account with the given address not found.
                    errorParam: address
                    errorLink: https://docs.cdp.coinbase.com/api-reference/v2/errors#not-found
        '422':
          $ref: '#/components/responses/IdempotencyError'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '502':
          $ref: '#/components/responses/BadGatewayError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
