    OnrampUserIdType:
      type: string
      description: |
        The type of user identifier:
        - `phone_number`: A phone number in E.164 format associated with an onramp user.
      enum:
        - phone_number
      example: phone_number
    OnrampLimitType:
      type: string
      description: |
        The type of limit:
        - `weekly_spending`: Rolling 7-day spending limit. The limit applies to the sum of all completed transactions 
          within a sliding 168-hour (7-day) window. As time passes, older transactions naturally expire from the window. 
          $500 is the default limit.
        - `lifetime_transactions`: All-time transaction count limit. Tracks the total number of completed transactions 
          across the user's entire history with no time-based expiration. Once the limit is reached, no further 
          transactions are allowed. 15 is the default limit.
      enum:
        - weekly_spending
        - lifetime_transactions
      example: weekly_spending
    OnrampUserLimit:
      type: object
      description: A single limit with remaining capacity.
      properties:
        limitType:
          $ref: '#/components/schemas/OnrampLimitType'
        currency:
          type: string
          description: The currency of the limit amounts. Only present for spending limits, not for count-based limits.
          example: USD
        limit:
          type: string
          description: The maximum limit value.
          example: '2500'
        remaining:
          type: string
          description: The remaining amount or count available.
          example: '2000'
      required:
        - limitType
        - limit
        - remaining
  responses:
    UnauthorizedError:
      description: Unauthorized.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            unauthorized:
              value:
                errorType: unauthorized
                errorMessage: The request is not properly authenticated.
    InternalServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            internal_server_error:
              value:
                errorType: internal_server_error
                errorMessage: An internal server error occurred. Please try again later.
    BadGatewayError:
      description: Bad gateway.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            bad_gateway:
              value:
                errorType: bad_gateway
                errorMessage: Bad gateway. Please try again later.
    ServiceUnavailableError:
      description: Service unavailable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            service_unavailable:
              value:
                errorType: service_unavailable
                errorMessage: Service unavailable. Please try again later.
    PaymentMethodRequiredError:
      description: A payment method is required to complete this operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            payment_method_required:
              value:
                errorType: payment_method_required
                errorMessage: A valid payment method is required to complete this operation. Please add a payment method to your account at https://portal.cdp.coinbase.com.
    IdempotencyError:
      description: Idempotency key conflict.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            idempotency_error:
              value:
                errorType: idempotency_error
                errorMessage: Idempotency key '8e03978e-40d5-43e8-bc93-6894a57f9324' was already used with a different request payload. Please try again with a new idempotency key.
    AlreadyExistsError:
      description: The resource already exists.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            idempotency_key_already_exists:
              value:
                errorType: already_exists
                errorMessage: Another request with the same idempotency key is currently processing.
    InvalidSQLQueryError:
      description: The underlying SQL string is invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            unsupported_query:
              value:
                errorType: invalid_sql_query
                errorMessage: INSERTs are not supported
            invalid_sql:
              value:
                errorType: invalid_sql_query
                errorMessage: 'SQL syntax error: Invalid table name ''invalid_table'''
            query_too_long:
              value:
                errorType: invalid_sql_query
                errorMessage: Query exceeds maximum length of 10,000 characters
    ClientClosedRequestError:
      description: The client closed the connection before the server could send a response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            client_closed_request:
              value:
                errorType: client_closed_request
                errorMessage: The client closed the request before the server could send a response.
    TimedOutError:
      description: The request timed out.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            timed_out:
              value:
                errorType: timed_out
                errorMessage: The request timed out because the server did not respond in time.
    x402VerifyResponse:
      description: Successfully verified payment on the x402 protocol.
      content:
        application/json:
          schema:
            type: object
            properties:
              isValid:
                type: boolean
                description: Indicates whether the payment is valid.
                example: false
              invalidReason:
                $ref: '#/components/schemas/x402VerifyInvalidReason'
              invalidMessage:
                type: string
                description: The message describing the invalid reason.
                example: Insufficient funds
              payer:
                type: string
                description: |-
                  The onchain address of the client that is paying for the resource.

                  For EVM networks, the payer will be a 0x-prefixed, checksum EVM address.

                  For Solana-based networks, the payer will be a base58-encoded Solana address.
                pattern: ^(0x[a-fA-F0-9]{40}|[1-9A-HJ-NP-Za-km-z]{32,44})$
                example: '0x742d35Cc6634C0532925a3b844Bc454e4438f44e'
            required:
              - isValid
              - payer
    x402VerifyInvalidError:
      description: Invalid payment verification on the x402 protocol.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/x402VerifyPaymentRejection'
          examples:
            invalid_verification:
              value:
                isValid: false
                invalidReason: insufficient_funds
                invalidMessage: Insufficient funds
                payer: '0x742d35Cc6634C0532925a3b844Bc454e4438f44e'
    x402SettleResponse:
      description: Successfully settled payment on the x402 protocol.
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                description: Indicates whether the payment settlement is successful.
                example: false
              errorReason:
                $ref: '#/components/schemas/x402SettleErrorReason'
              errorMessage:
                type: string
                description: The message describing the error reason.
                example: Insufficient funds
              payer:
                type: string
                description: |-
                  The onchain address of the client that is paying for the resource.

                  For EVM networks, the payer will be a 0x-prefixed, checksum EVM address.

                  For Solana-based networks, the payer will be a base58-encoded Solana address.
                pattern: ^(0x[a-fA-F0-9]{40}|[1-9A-HJ-NP-Za-km-z]{32,44})$
                example: '0x742d35Cc6634C0532925a3b844Bc454e4438f44e'
              transaction:
                type: string
                description: |-
                  The transaction of the settlement.
                  For EVM networks, the transaction will be a 0x-prefixed, EVM transaction hash.
                  For Solana-based networks, the transaction will be a base58-encoded Solana signature.
                pattern: ^(0x[a-fA-F0-9]{64}|[1-9A-HJ-NP-Za-km-z]{87,88})$
                example: '0x89c91c789e57059b17285e7ba1716a1f5ff4c5dace0ea5a5135f26158d0421b9'
              network:
                type: string
                description: The network where the settlement occurred.
                example: base
            required:
              - success
              - payer
              - transaction
              - network
    x402SettleError:
      description: Unsuccessful payment settlement on the x402 protocol.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/x402SettlePaymentRejection'
          examples:
            unsuccessful_settlement:
              value:
                success: false
                errorReason: insufficient_funds
                errorMessage: Insufficient funds
                payer: '0x742d35Cc6634C0532925a3b844Bc454e4438f44e'
    x402SupportedPaymentKindsResponse:
      description: Successfully retrieved supported payment kinds for the x402 protocol.
      content:
        application/json:
          schema:
            type: object
            properties:
              kinds:
                type: array
                description: The list of supported payment kinds.
                items:
                  $ref: '#/components/schemas/x402SupportedPaymentKind'
                example:
                  - x402Version: 1
                    scheme: exact
                    network: base
                  - x402Version: 1
                    scheme: exact
                    network: base-sepolia
                  - x402Version: 1
                    scheme: exact
                    network: solana
                  - x402Version: 1
                    scheme: exact
                    network: solana-devnet
                  - x402Version: 1
                    scheme: exact
                    network: polygon
              extensions:
                type: array
                description: The list of supported x402 extensions.
                items:
                  type: string
                example:
                  - bazaar
              signers:
                type: object
                description: A map of CAIP-2 network or protocol family patterns to their supported signer addresses.
                additionalProperties:
                  type: array
                  items:
                    type: string
                example:
                  eip155:*:
                    - '0x1234567890abcdef1234567890abcdef12345678'
                    - '0xabcdef1234567890abcdef1234567890abcdef12'
                  solana:*:
                    - 5eykt4UsFv8P8NJdTREpY1vzqKqZKvdpKuc147dw2N9d
            required:
              - kinds
              - extensions
              - signers
    RateLimitExceeded:
      description: Rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            rate_limit_exceeded:
              value:
                errorType: rate_limit_exceeded
                errorMessage: Rate limit exceeded.
  parameters:
    XWalletAuth:
      name: X-Wallet-Auth
      in: header
      required: true
      description: |
        A JWT signed using your Wallet Secret, encoded in base64. Refer to the
        [Generate Wallet Token](https://docs.cdp.coinbase.com/api-reference/v2/authentication#2-generate-wallet-token)
        section of our Authentication docs for more details on how to generate your Wallet Token.
      schema:
        type: string
      example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOjEyMywicm9sZSI6ImFkbWluIiwiZXhwIjoxNzAxOTgwMDAwfQ.HWvMTKmCCTxHaxjvZyLaC6UQ6TV3ErTDWBf7zmdH0Lw
    IdempotencyKey:
      name: X-Idempotency-Key
      in: header
      required: false
      description: |
        An optional string request header for making requests safely retryable.
        When included, duplicate requests with the same key will return identical responses.
        Refer to our [Idempotency docs](https://docs.cdp.coinbase.com/api-reference/v2/idempotency) for more information on using idempotency keys.
      schema:
        type: string
        maxLength: 128
        minLength: 1
      example: 8e03978e-40d5-43e8-bc93-6894a57f9324
    XDeveloperAuth:
      name: X-Developer-Auth
      in: header
      required: false
      description: |
        A JWT signed using your Wallet Secret, encoded in base64. Refer to the
        [Generate Wallet Token](https://docs.cdp.coinbase.com/api-reference/v2/authentication#2-generate-wallet-token)
        section of our Authentication docs for more details on how to generate your Wallet Token.
      schema:
        type: string
      example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOjEyMywicm9sZSI6ImFkbWluIiwiZXhwIjoxNzAxOTgwMDAwfQ.HWvMTKmCCTxHaxjvZyLaC6UQ6TV3ErTDWBf7zmdH0Lw
    XWalletAuthOptional:
      name: X-Wallet-Auth
      in: header
      required: false
      description: |
        A JWT signed using your Wallet Secret, encoded in base64. Refer to the
        [Generate Wallet Token](https://docs.cdp.coinbase.com/api-reference/v2/authentication#2-generate-wallet-token)
        section of our Authentication docs for more details on how to generate your Wallet Token.
      schema:
        type: string
      example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOjEyMywicm9sZSI6ImFkbWluIiwiZXhwIjoxNzAxOTgwMDAwfQ.HWvMTKmCCTxHaxjvZyLaC6UQ6TV3ErTDWBf7zmdH0Lw
    PageSize:
      name: pageSize
      description: The number of resources to return per page.
      in: query
      required: false
      schema:
        type: integer
        default: 20
      example: 10
    PageToken:
      name: pageToken
      description: The token for the next page of resources, if any.
      in: query
      required: false
      schema:
        type: string
      example: eyJsYXN0X2lkIjogImFiYzEyMyIsICJ0aW1lc3RhbXAiOiAxNzA3ODIzNzAxfQ==
