  /v2/embedded-wallet-api/projects/{projectId}/end-users/{userId}/solana/send/transaction:
    post:
      x-audience: public
      summary: Send a transaction with end user Solana account
      description: |-
        Signs a transaction with the given end user Solana account and sends it to the indicated supported network.
        The API handles recent blockhash management and fee estimation, leaving the developer to provide only the minimal set of fields necessary to send the transaction.
        The unsigned transaction should be serialized into a byte array and then encoded as base64.
        **Transaction types**
        The following transaction types are supported:
        * [Legacy transactions](https://solana.com/developers/guides/advanced/versions#current-transaction-versions)
        * [Versioned transactions](https://solana.com/developers/guides/advanced/versions)
        **Instruction Batching**
        To batch multiple operations, include multiple instructions within a single transaction. All instructions within a transaction are executed atomically - if any instruction fails, the entire transaction fails and is rolled back.
        **Network Support**
        The following Solana networks are supported:
        * `solana` - Solana Mainnet
        * `solana-devnet` - Solana Devnet
        The developer is responsible for ensuring that the unsigned transaction is valid, as the API will not validate the transaction.
      operationId: sendSolanaTransactionWithEndUserAccount
      tags:
        - Embedded Wallets (Core Functionality)
      security:
        - endUserAuth: []
        - apiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/XWalletAuth'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/XDeveloperAuth'
        - name: projectId
          in: path
          required: true
          description: The ID of the CDP Project.
          schema:
            type: string
            pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$
            example: 8e03978e-40d5-43e8-bc93-6894a57f9324
        - name: userId
          description: The ID of the end user.
          in: path
          required: true
          schema:
            type: string
            pattern: ^[a-zA-Z0-9-]{1,100}$
            example: e051beeb-7163-4527-a5b6-35e301529ff2
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                address:
                  type: string
                  description: The base58 encoded address of the Solana account belonging to the end user.
                  example: HpabPRRCFbBKSuJr5PdkVvQc85FyxyTWkFM2obBRSvHT
                  pattern: ^[1-9A-HJ-NP-Za-km-z]{32,44}$
                network:
                  type: string
                  description: The Solana network to send the transaction to.
                  enum:
                    - solana
                    - solana-devnet
                  example: solana-devnet
                walletSecretId:
                  description: Required when not using delegated signing. The ID of the Temporary Wallet Secret that was used to sign the X-Wallet-Auth Header.
                  type: string
                  pattern: ^[a-zA-Z0-9-]{1,100}$
                  example: e051beeb-7163-4527-a5b6-35e301529ff2
                transaction:
                  type: string
                  description: The base64 encoded transaction to sign and send. This transaction can contain multiple instructions for native Solana batching.
                  example: AQABAgIAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQABAQECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8CBgMBAQAAAAIBAwQAAAAABgIAAAAAAAYDBQEBAAAGBAgAAAAABgUAAAAA6AMAAAAAAAAGBgUBAQEBBgcEAQAAAAYICgMBAQIDBgkCBgAAAAYKAwABAQEGCwMGAQEBBgwDAAABAQAAAAA=
                useCdpSponsor:
                  type: boolean
                  description: Whether transaction fees should be sponsored by CDP. When true, CDP sponsors the transaction fees on behalf of the end user. When false, the end user is responsible for paying the transaction fees.
                  example: true
              required:
                - address
                - network
                - transaction
            examples:
              send_transaction:
                summary: Send a transaction
                value:
                  address: HpabPRRCFbBKSuJr5PdkVvQc85FyxyTWkFM2obBRSvHT
                  network: solana-devnet
                  transaction: AQABAgIAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQABAQECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8CBgMBAQAAAAIBAwQAAAAABgIAAAAAAAYDBQEBAAAGBAgAAAAABgUAAAAA6AMAAAAAAAAGBgUBAQEBBgcEAQAAAAYICgMBAQIDBgkCBgAAAAYKAwABAQEGCwMGAQEBBgwDAAABAQAAAAA=
                  walletSecretId: e051beeb-7163-4527-a5b6-35e301529ff2
              send_transaction_sponsored:
