      enum:
        - GUEST_CHECKOUT_APPLE_PAY
        - GUEST_CHECKOUT_GOOGLE_PAY
      example: GUEST_CHECKOUT_APPLE_PAY
    OnrampOrderFee:
      type: object
      description: A fee associated with an order.
      properties:
        type:
          type: string
          enum:
            - FEE_TYPE_NETWORK
            - FEE_TYPE_EXCHANGE
          description: The type of fee.
          example: FEE_TYPE_NETWORK
